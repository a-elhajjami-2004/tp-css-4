<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Question 3.1 - Cartes de même hauteur</title>
		<style>
			* {
				box-sizing: border-box;
			}

			body {
				font-family: system-ui;
				padding: 2rem;
			}
			.card-container {
				display: flex;
				flex-wrap: wrap;
				gap: 1rem;
			}

			.card {
				background-color: lightyellow;
				flex: 1 1 40ch;
				display: flex;
				flex-direction: column;
				padding: 1em;
				border-radius: 1em;
			}

			.card p {
				flex: 1;
			}

			.card-link {
				margin-top: auto;
			}
		</style>
	</head>
	<body>
		<div class="cards">
			<div class="card">
				<h3>Carte 1</h3>
				<p>Contenu court.</p>
				<a href="#" class="card-link">En savoir plus</a>
			</div>
			<div class="card">
				<h3>Carte 2</h3>
				<p>Contenu beaucoup plus long pour tester l'alignement vertical des boutons.</p>
				<a href="#" class="card-link">En savoir plus</a>
			</div>
			<div class="card">
				<h3>Carte 3</h3>
				<p>Contenu moyen.</p>
				<a href="#" class="card-link">En savoir plus</a>
			</div>
		</div>
	</body>
</html>
