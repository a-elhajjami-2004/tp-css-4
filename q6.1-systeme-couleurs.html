<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Question 6.1 - Système de couleurs - Thèmes clair et sombre</title>
		<style>
			:root {
				/* Thème clair */
				--card-bg-color-light: #f0f0f0;
				--card-border-color-light: #ccc;
				--card-text-color-light: black;
				/* Thème sombre */
				--card-bg-color-dark: #333;
				--card-border-color-dark: #555;
				--card-text-color-dark: white;
			}
			.grid-cards {
				font-family: system-ui;
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
				gap: 1rem;
				padding: 1rem;
			}
			.card {
				background-color: var(--card-bg-color-light);
				border: 1px solid var(--card-border-color-light);
				border-radius: 0.5rem;
				padding: 1rem;
				text-align: center;
				font-size: 1.2em;
			}
			@media (prefers-color-scheme: dark) {
				.card {
					background-color: var(--card-bg-color-dark);
					border-color: var(--card-border-color-dark);
					color: var(--card-text-color-dark);
				}
			}
		</style>
	</head>
	<body>
		<div class="grid-cards">
			<div class="card">Carte 1</div>
			<div class="card">Carte 2</div>
			<div class="card">Carte 3</div>
			<div class="card">Carte 4</div>
			<div class="card">Carte 5</div>
			<div class="card">Carte 6</div>
		</div>
	</body>
</html>
