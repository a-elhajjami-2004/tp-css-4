<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Question 3.1 - Barre de navigation</title>
		<style>
			body {
				margin: 0;
				font-family: system-ui;
			}
			.navbar {
				display: flex;
				align-items: center;
				justify-content: space-between;
				background-color: #333;
				padding: 0.75rem 1.25rem;
			}
			.logo {
				color: white;
				font-size: 1.5rem;
				font-weight: bold;
			}
			.nav-links {
				list-style: none;
				display: flex;
				gap: 1.5rem;
				margin: 0;
				padding: 0;
			}
		</style>
	</head>
	<body>
		<nav class="navbar">
			<div class="logo">MonSite</div>
			<ul class="nav-links">
				<li><a href="#">Accueil</a></li>
				<li><a href="#">Services</a></li>
				<li><a href="#">Contact</a></li>
			</ul>
		</nav>
	</body>
</html>
