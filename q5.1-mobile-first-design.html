<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Question 5.1 - Responsive Design - Mobile First</title>
		<!-- Ajoutez les media queries pour tablette et desktop -->
		<style>
			/* Base mobile */
			body {
				font-family: system-ui;
				margin: 0;
			}

			header {
				background-color: #f8b400;
			}

			.container {
				width: 100%;
				padding: 15px;
			}

			.nav-menu {
				display: flex;
				flex-direction: column;
				gap: 5px;
			}

			.content {
				background-color: #2196f3;
				display: block;
			}

			.sidebar {
				background-color: #4caf50;
				display: none;
			}

			/* Tablette */
			@media (min-width: 768px) {
				body {
					margin: 0;
					min-height: 100vh;
				}

				.nav-menu {
					flex-direction: row;
					justify-content: end;
					gap: 1.5rem;
				}

				.container {
					display: flex;
					flex-direction: row;
					padding: 1.5rem;
					gap: 1.5rem;
				}

				.content {
					flex: 3 1 auto;
				}

				.sidebar {
					display: block;
					flex: 1 1 auto;
				}
			}

			/* Desktop */
			@media (min-width: 992px) {
				.container {
					max-width: 960px;
					margin: 0 auto;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<nav class="nav-menu">
				<a href="#">Accueil</a>
				<a href="#">À Propos</a>
				<a href="#">Services</a>
			</nav>
		</header>
		<div class="container">
			<main class="content">
				<h1>Bienvenue sur notre site</h1>
				<p>Ceci est un exemple de design mobile first.</p>
			</main>
			<aside class="sidebar">
				<h2>Sidebar</h2>
				<p>Contenu de la sidebar pour les écrans plus grands.</p>
			</aside>
		</div>
	</body>
</html>
